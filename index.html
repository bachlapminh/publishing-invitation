<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#103326">
  <meta name="description" content="Ước Rồng Online — Đề xuất hợp tác phát hành.">
  <title>Ước Rồng Online — Đề xuất hợp tác phát hành</title>
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- ===================================================================
       TOÀN BỘ NỘI DUNG CHỮ nằm ở: assets/js/content.js  (sửa ở đó)
       main.js đọc content.js rồi render header / 14 section / footer.
       File index.html này chỉ là KHUNG, không chứa chữ nội dung.
       Thứ tự nạp: content.js trước, main.js sau (cùng defer, giữ thứ tự).
       =================================================================== -->
  <script src="assets/js/content.js" defer></script>
  <script src="assets/js/main.js" defer></script>
</head>
<body>

  <!-- Skip link cho accessibility -->
  <a class="skip-link" href="#main">Bỏ qua tới nội dung chính</a>

  <!-- Thanh tiến trình đọc -->
  <div class="reading-progress" aria-hidden="true">
    <div class="reading-progress__fill" id="progressFill"></div>
  </div>

  <!-- Header / Main / Footer: được render từ content.js bằng main.js -->
  <header class="site-header" id="siteHeader"></header>
  <main id="main"></main>
  <footer class="site-footer" id="siteFooter"></footer>

  <!-- Nút về đầu trang -->
  <button class="back-to-top" id="backToTop" aria-label="Về đầu trang" hidden>
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M12 19V5M6 11l6-6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <!-- Cảnh báo khi tắt JavaScript -->
  <noscript>
    <div style="padding:2.5rem 1.5rem;text-align:center;font-family:'Segoe UI',system-ui,sans-serif;color:#164534;background:#f6f2e9">
      <strong>Trang cần bật JavaScript để hiển thị nội dung.</strong><br>
      Vui lòng bật JavaScript trong trình duyệt rồi tải lại trang.
    </div>
  </noscript>

</body>
</html>
